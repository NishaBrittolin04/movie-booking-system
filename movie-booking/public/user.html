<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVerse — Book Tickets</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #c9a84c; --gold-light: #e8c878; --dark: #0a0a0f; --dark2: #12121a;
    --dark3: #1a1a26; --card: #1e1e2e; --border: rgba(201,168,76,0.15);
    --text: #e8e8f0; --text-dim: #8888a8; --red: #e85555; --green: #55e8a0;
    --blue: #5588e8;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--dark2); border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), #b8862a); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .header-logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); }

  .header-nav { display: flex; gap: 4px; }
  .nav-btn {
    padding: 8px 16px; border-radius: 8px; border: none; background: none;
    color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--dark3); color: var(--text); }
  .nav-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-badge { display: flex; align-items: center; gap: 8px; background: var(--dark3); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); }
  .user-badge-avatar { width: 28px; height: 28px; background: linear-gradient(135deg, var(--gold), #b8862a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: var(--dark); }
  .user-badge-name { font-size: 0.85rem; font-weight: 600; }
  .btn-logout { padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(232,85,85,0.25); background: rgba(232,85,85,0.06); color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { background: rgba(232,85,85,0.12); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero {
    padding: 48px 32px 32px;
    background: linear-gradient(180deg, rgba(201,168,76,0.05) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; }
  .hero-title span { background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-sub { color: var(--text-dim); font-size: 1rem; margin-bottom: 24px; }

  /* FILTERS */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--dark2); color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
  }
  .filter-chip:hover, .filter-chip.active { background: rgba(201,168,76,0.12); color: var(--gold); border-color: rgba(201,168,76,0.35); }

  /* MOVIES */
  .movies-container { padding: 28px 32px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
  .section-count { font-size: 0.82rem; color: var(--text-dim); }

  .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .movie-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-4px); box-shadow: 0 12px 35px rgba(0,0,0,0.35); border-color: rgba(201,168,76,0.3); }

  .movie-poster {
    height: 180px; display: flex; align-items: center; justify-content: center;
    font-size: 4rem; position: relative; overflow: hidden;
  }
  .movie-avail-badge {
    position: absolute; top: 10px; right: 10px;
    padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
  }
  .avail-good { background: rgba(85,232,160,0.15); color: var(--green); border: 1px solid rgba(85,232,160,0.3); }
  .avail-low { background: rgba(232,200,85,0.15); color: #e8c855; border: 1px solid rgba(232,200,85,0.3); }
  .avail-none { background: rgba(232,85,85,0.12); color: var(--red); border: 1px solid rgba(232,85,85,0.25); }

  .movie-card-info { padding: 16px; }
  .movie-card-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-card-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.76rem; color: var(--text-dim); margin-bottom: 12px; }
  .meta-chip { display: flex; align-items: center; gap: 4px; }

  .movie-seat-bar { margin-bottom: 14px; }
  .seat-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; }
  .seat-bar-track { background: var(--dark2); border-radius: 4px; height: 5px; overflow: hidden; }
  .seat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 4px; }

  .price-badges { display: flex; gap: 6px; margin-bottom: 14px; }
  .price-tag { flex: 1; background: var(--dark2); border-radius: 8px; padding: 7px; text-align: center; }
  .price-tag .pt-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .price-tag .pt-value { font-size: 0.88rem; font-weight: 700; margin-top: 2px; }
  .price-tag.upper .pt-value { color: var(--gold); }
  .price-tag.middle .pt-value { color: var(--blue); }
  .price-tag.lower .pt-value { color: var(--green); }

  .btn-book {
    width: 100%; padding: 11px; background: linear-gradient(135deg, var(--gold), #b8862a);
    border: none; border-radius: 8px; color: var(--dark); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-book:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(201,168,76,0.3); }
  .btn-book:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* BOOKING MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
    z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--dark2); border: 1px solid var(--border); border-radius: 20px;
    width: 100%; max-width: 680px; max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

  .modal-header {
    padding: 22px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--dark2); z-index: 1;
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .modal-close:hover { background: var(--dark3); color: var(--text); }
  .modal-body { padding: 20px 24px; }

  /* SEAT PICKER */
  .level-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .level-tab {
    flex: 1; padding: 10px 6px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--dark3); color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .level-tab.active.upper { background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.4); color: var(--gold); }
  .level-tab.active.middle { background: rgba(85,136,232,0.12); border-color: rgba(85,136,232,0.4); color: var(--blue); }
  .level-tab.active.lower { background: rgba(85,232,160,0.1); border-color: rgba(85,232,160,0.3); color: var(--green); }
  .level-tab-label { font-size: 0.7rem; margin-bottom: 2px; }
  .level-tab-price { font-size: 0.9rem; }
  .level-tab-avail { font-size: 0.68rem; opacity: 0.7; }

  .screen-bar {
    text-align: center; padding: 8px; background: var(--dark3); border-radius: 8px;
    margin-bottom: 16px; font-size: 0.72rem; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase;
    border-top: 3px solid rgba(201,168,76,0.4);
  }

  .seats-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-bottom: 16px; }
  .seat-btn {
    aspect-ratio: 1; border-radius: 5px; border: none; font-size: 0.58rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif;
  }
  .seat-btn.available {
    background: var(--dark3); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim); cursor: pointer;
  }
  .seat-btn.available:hover { transform: scale(1.1); border-color: var(--gold); color: var(--gold); }
  .seat-btn.booked { background: rgba(232,85,85,0.1); border: 1px solid rgba(232,85,85,0.25); color: rgba(232,85,85,0.5); cursor: not-allowed; }
  .seat-btn.selected { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 800; transform: scale(1.1); }

  .seat-legend { display: flex; gap: 14px; margin-bottom: 20px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim); }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; }
  .legend-box.avail { background: var(--dark3); border: 1px solid rgba(255,255,255,0.1); }
  .legend-box.bkd { background: rgba(232,85,85,0.1); border: 1px solid rgba(232,85,85,0.25); }
  .legend-box.sel { background: var(--gold); }

  /* BOOKING SUMMARY */
  .booking-summary {
    background: var(--dark3); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
  }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.88rem; }
  .summary-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
  .summary-label { color: var(--text-dim); }
  .summary-value { font-weight: 600; }
  .summary-total .summary-label { font-weight: 700; color: var(--text); }
  .summary-total .summary-value { color: var(--gold); font-size: 1.1rem; font-weight: 800; }

  .btn-confirm {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #b8862a);
    border: none; border-radius: 10px; color: var(--dark); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-confirm:hover { box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MY BOOKINGS */
  .bookings-container { padding: 28px 32px; }
  .booking-ticket {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; margin-bottom: 16px; display: flex; transition: transform 0.2s;
  }
  .booking-ticket:hover { transform: translateX(4px); }
  .ticket-accent {
    width: 6px; flex-shrink: 0;
  }
  .ticket-accent.upper { background: var(--gold); }
  .ticket-accent.middle { background: var(--blue); }
  .ticket-accent.lower { background: var(--green); }
  .ticket-body { flex: 1; padding: 18px 20px; }
  .ticket-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .ticket-movie { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .ticket-status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .ticket-status.confirmed { background: rgba(85,232,160,0.12); color: var(--green); border: 1px solid rgba(85,232,160,0.3); }
  .ticket-status.cancelled { background: rgba(232,85,85,0.1); color: var(--red); border: 1px solid rgba(232,85,85,0.2); }

  .ticket-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
  .ticket-detail { }
  .ticket-detail-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .ticket-detail-value { font-size: 0.88rem; font-weight: 600; }
  .ticket-detail-value.gold { color: var(--gold); }

  .ticket-ref { font-family: monospace; font-size: 0.8rem; color: var(--text-dim); }
  .ticket-footer { display: flex; justify-content: space-between; align-items: center; }
  .level-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 700; }
  .level-badge.upper { background: rgba(201,168,76,0.15); color: var(--gold); }
  .level-badge.middle { background: rgba(85,136,232,0.12); color: var(--blue); }
  .level-badge.lower { background: rgba(85,232,160,0.1); color: var(--green); }

  .btn-cancel-booking {
    padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(232,85,85,0.25);
    background: rgba(232,85,85,0.06); color: var(--red); font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel-booking:hover { background: rgba(232,85,85,0.12); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 14px; opacity: 0.4; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 0.88rem; }

  .loader-spin { display: inline-block; width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 0.88rem; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; max-width: 300px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(85,232,160,0.4); color: var(--green); }
  .toast.error { border-color: rgba(232,85,85,0.4); color: var(--red); }

  /* SUCCESS ANIMATION */
  .booking-success {
    text-align: center; padding: 30px 20px;
  }
  .success-icon { font-size: 3.5rem; margin-bottom: 14px; animation: bounce 0.6s ease; }
  @keyframes bounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: var(--green); }
  .success-ref { font-family: monospace; font-size: 1.1rem; color: var(--gold); background: var(--dark3); padding: 10px 20px; border-radius: 8px; margin: 14px auto; display: inline-block; letter-spacing: 2px; }
  .success-detail { color: var(--text-dim); font-size: 0.88rem; margin-bottom: 20px; }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="header-logo-icon">🎬</div>
    <span class="header-logo-text">CineVerse</span>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="showPage('movies')">🎬 Movies</button>
    <button class="nav-btn" onclick="showPage('bookings')">🎟️ My Tickets</button>
  </div>
  <div class="header-right">
    <div class="user-badge">
      <div class="user-badge-avatar" id="userInitial">U</div>
      <span class="user-badge-name" id="userName">User</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</header>

<!-- MOVIES PAGE -->
<div class="page active" id="page-movies">
  <div class="hero">
    <div class="hero-title">Now <span>Showing</span></div>
    <div class="hero-sub">Select a movie, choose your level and seat number</div>
    <div class="filters" id="filterBar">
      <button class="filter-chip active" onclick="filterMovies('all', this)">All Shows</button>
    </div>
  </div>
  <div class="movies-container">
    <div class="section-header">
      <div class="section-title">Available Movies</div>
      <div class="section-count" id="movieCount"></div>
    </div>
    <div class="movies-grid" id="moviesGrid">
      <div style="text-align:center; padding:40px; grid-column:1/-1;"><div class="loader-spin"></div></div>
    </div>
  </div>
</div>

<!-- BOOKINGS PAGE -->
<div class="page" id="page-bookings">
  <div class="bookings-container">
    <div class="section-header">
      <div class="section-title">🎟️ My Tickets</div>
    </div>
    <div id="bookingsContainer">
      <div style="text-align:center;padding:40px;"><div class="loader-spin"></div></div>
    </div>
  </div>
</div>

<!-- SEAT SELECTION MODAL -->
<div class="modal-overlay" id="seatModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalMovieTitle">Select Your Seat</div>
        <div style="font-size:0.78rem; color:var(--text-dim); margin-top:3px;" id="modalMovieMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div style="text-align:center;padding:40px;"><div class="loader-spin"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allMovies = [];
let currentUser = null;
let selectedSeat = null;
let currentMovieData = null;
let activeLevel = 'upper';

// ─── INIT ────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/'; return; }
    const { user } = await res.json();
    if (user.role === 'manager') { window.location.href = '/manager'; return; }
    currentUser = user;
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userInitial').textContent = user.name[0].toUpperCase();
    loadMovies();
  } catch { window.location.href = '/'; }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/';
}

// ─── NAV ─────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(name === 'movies' ? 'movie' : 'ticket')) b.classList.add('active');
  });
  if (name === 'bookings') loadBookings();
}

// ─── MOVIES ──────────────────────────────────────────────
async function loadMovies() {
  try {
    const res = await fetch('/api/movies', { credentials: 'include' });
    allMovies = await res.json();
    renderMovies(allMovies);
    buildFilters();
  } catch { showToast('Failed to load movies', 'error'); }
}

function buildFilters() {
  const langs = [...new Set(allMovies.map(m => m.language))];
  const bar = document.getElementById('filterBar');
  langs.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.textContent = lang;
    btn.onclick = () => filterMovies(lang, btn);
    bar.appendChild(btn);
  });
}

function filterMovies(filter, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const filtered = filter === 'all' ? allMovies : allMovies.filter(m => m.language === filter);
  renderMovies(filtered);
}

function renderMovies(movies) {
  document.getElementById('movieCount').textContent = `${movies.length} show${movies.length !== 1 ? 's' : ''}`;
  const emojis = ['🎭', '🚀', '🔥', '💀', '😂', '❤️', '🎯', '⚔️', '🌊', '👁️'];
  const gradients = [
    'linear-gradient(135deg, #1a1a2e, #16213e)',
    'linear-gradient(135deg, #1a0a2e, #2e1654)',
    'linear-gradient(135deg, #0a1a12, #0d2e1a)',
    'linear-gradient(135deg, #2e0a0a, #1a0a0a)',
    'linear-gradient(135deg, #1a1a0a, #2e2a0a)',
  ];

  if (!movies.length) {
    document.getElementById('moviesGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🎬</div><h3>No movies available</h3><p>Check back later for upcoming shows</p></div>';
    return;
  }

  document.getElementById('moviesGrid').innerHTML = movies.map((m, i) => {
    const total = parseInt(m.total_seats) || 0;
    const booked = parseInt(m.booked_seats) || 0;
    const avail = parseInt(m.available_seats) || 0;
    const pct = total ? Math.round((booked / total) * 100) : 0;
    const emoji = emojis[m.id % emojis.length];
    const gradient = gradients[m.id % gradients.length];
    let availClass = 'avail-good', availText = `${avail} seats left`;
    if (avail === 0) { availClass = 'avail-none'; availText = 'Housefull'; }
    else if (avail < 10) { availClass = 'avail-low'; availText = `Only ${avail} left!`; }

    return `
    <div class="movie-card" onclick="openSeatPicker(${m.id})">
      <div class="movie-poster" style="background:${gradient}">
        <span style="font-size:3.5rem;">${emoji}</span>
        <div class="movie-avail-badge ${availClass}">${availText}</div>
      </div>
      <div class="movie-card-info">
        <div class="movie-card-title" title="${m.title}">${m.title}</div>
        <div class="movie-card-meta">
          <span class="meta-chip">🎭 ${m.genre}</span>
          <span class="meta-chip">🌐 ${m.language}</span>
          <span class="meta-chip">⏱ ${m.duration}min</span>
          <span class="meta-chip">📅 ${formatDate(m.show_date)} ${m.show_time ? m.show_time.substring(0,5) : ''}</span>
        </div>
        <div class="movie-seat-bar">
          <div class="seat-bar-label">
            <span>Occupancy</span>
            <span>${booked}/${total} (${pct}%)</span>
          </div>
          <div class="seat-bar-track"><div class="seat-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="price-badges">
          <div class="price-tag upper"><div class="pt-label">Upper</div><div class="pt-value">₹${m.price_upper}</div></div>
          <div class="price-tag middle"><div class="pt-label">Middle</div><div class="pt-value">₹${m.price_middle}</div></div>
          <div class="price-tag lower"><div class="pt-label">Lower</div><div class="pt-value">₹${m.price_lower}</div></div>
        </div>
        <button class="btn-book" ${avail === 0 ? 'disabled' : ''} onclick="event.stopPropagation(); openSeatPicker(${m.id})">
          ${avail === 0 ? 'Housefull' : '🎟️ Book Tickets'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ─── SEAT PICKER ─────────────────────────────────────────
async function openSeatPicker(movieId) {
  selectedSeat = null;
  activeLevel = 'upper';
  document.getElementById('seatModal').classList.add('open');
  document.getElementById('modalBody').innerHTML = '<div style="text-align:center;padding:40px;"><div class="loader-spin"></div><p style="margin-top:12px;color:var(--text-dim);">Loading seats…</p></div>';

  try {
    const res = await fetch(`/api/movies/${movieId}/seats`, { credentials: 'include' });
    currentMovieData = await res.json();
    document.getElementById('modalMovieTitle').textContent = currentMovieData.movie.title;
    document.getElementById('modalMovieMeta').textContent = `${formatDate(currentMovieData.movie.show_date)} • ${currentMovieData.movie.show_time ? currentMovieData.movie.show_time.substring(0,5) : ''} • ${currentMovieData.movie.language}`;
    renderSeatPicker();
  } catch { document.getElementById('modalBody').innerHTML = '<p style="color:var(--red);text-align:center;">Failed to load seats</p>'; }
}

function renderSeatPicker() {
  const { movie, seats, stats } = currentMovieData;
  const statMap = {};
  stats.forEach(s => statMap[s.seat_level] = s);

  const levelInfo = {
    upper: { label: '🥇 Upper', price: movie.price_upper, color: 'gold' },
    middle: { label: '🥈 Middle', price: movie.price_middle, color: 'blue' },
    lower: { label: '🥉 Lower', price: movie.price_lower, color: 'green' },
  };

  const levelSeats = {};
  seats.forEach(s => {
    if (!levelSeats[s.seat_level]) levelSeats[s.seat_level] = [];
    levelSeats[s.seat_level].push(s);
  });

  const selectedInfo = selectedSeat ? seats.find(s => s.id === selectedSeat) : null;
  const price = selectedInfo ? (selectedInfo.seat_level === 'upper' ? movie.price_upper : selectedInfo.seat_level === 'middle' ? movie.price_middle : movie.price_lower) : null;

  document.getElementById('modalBody').innerHTML = `
    <div class="level-tabs">
      ${['upper','middle','lower'].map(level => {
        const s = statMap[level] || { total:0, available:0 };
        const info = levelInfo[level];
        return `<button class="level-tab ${activeLevel === level ? 'active' : ''} ${level}" onclick="switchLevel('${level}')">
          <div class="level-tab-label">${info.label}</div>
          <div class="level-tab-price">₹${info.price}</div>
          <div class="level-tab-avail">${s.available}/${s.total} avail</div>
        </button>`;
      }).join('')}
    </div>

    <div class="screen-bar">▬ S C R E E N ▬</div>

    ${['upper','middle','lower'].map(level => `
    <div class="seats-section" id="seats-${level}" style="display:${activeLevel===level?'block':'none'}">
      <div class="seats-grid">
        ${(levelSeats[level]||[]).map(seat => `
        <button class="seat-btn ${seat.is_booked ? 'booked' : (selectedSeat === seat.id ? 'selected' : 'available')}"
          onclick="${seat.is_booked ? '' : `selectSeat(${seat.id})`}"
          title="${seat.seat_number} – ${seat.is_booked ? 'Booked' : 'Available'}"
          ${seat.is_booked ? 'disabled' : ''}>
          ${seat.seat_number}
        </button>`).join('')}
      </div>
    </div>`).join('')}

    <div class="seat-legend">
      <div class="legend-item"><div class="legend-box avail"></div> Available</div>
      <div class="legend-item"><div class="legend-box bkd"></div> Booked</div>
      <div class="legend-item"><div class="legend-box sel"></div> Selected</div>
    </div>

    <div class="booking-summary">
      ${selectedInfo ? `
        <div class="summary-row"><span class="summary-label">Movie</span><span class="summary-value">${movie.title}</span></div>
        <div class="summary-row"><span class="summary-label">Level</span><span class="summary-value" style="text-transform:capitalize;">${selectedInfo.seat_level}</span></div>
        <div class="summary-row"><span class="summary-label">Seat Number</span><span class="summary-value" style="font-family:monospace;font-size:1rem;">${selectedInfo.seat_number}</span></div>
        <div class="summary-row summary-total"><span class="summary-label">Total</span><span class="summary-value">₹${price}</span></div>
      ` : `<div style="text-align:center; padding:10px; color:var(--text-dim); font-size:0.88rem;">👆 Click a seat to select it</div>`}
    </div>

    <button class="btn-confirm" onclick="confirmBooking()" ${!selectedSeat ? 'disabled' : ''} id="confirmBtn">
      ${selectedSeat ? `Confirm Booking — ₹${price}` : 'Select a Seat First'}
    </button>
  `;
}

function switchLevel(level) {
  activeLevel = level;
  renderSeatPicker();
}

function selectSeat(seatId) {
  selectedSeat = selectedSeat === seatId ? null : seatId;
  renderSeatPicker();
}

async function confirmBooking() {
  if (!selectedSeat || !currentMovieData) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Processing…';

  try {
    const res = await fetch('/api/bookings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ movie_id: currentMovieData.movie.id, seat_id: selectedSeat })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    const seat = currentMovieData.seats.find(s => s.id === selectedSeat);
    document.getElementById('modalBody').innerHTML = `
      <div class="booking-success">
        <div class="success-icon">🎉</div>
        <div class="success-title">Booking Confirmed!</div>
        <div class="success-ref">${data.booking_reference}</div>
        <div class="success-detail">
          <strong>${currentMovieData.movie.title}</strong><br>
          Level: ${seat.seat_level.charAt(0).toUpperCase()+seat.seat_level.slice(1)} &nbsp;|&nbsp; Seat: <strong>${seat.seat_number}</strong><br>
          Amount Paid: <strong style="color:var(--gold);">₹${data.amount}</strong>
        </div>
        <button class="btn-confirm" style="max-width:260px;" onclick="closeModal(); showPage('bookings')">View My Tickets →</button>
      </div>`;
    loadMovies();
  } catch (e) {
    showToast(e.message || 'Booking failed', 'error');
    btn.disabled = false;
    btn.textContent = 'Try Again';
  }
}

function closeModal() {
  document.getElementById('seatModal').classList.remove('open');
  selectedSeat = null;
}

// ─── MY BOOKINGS ─────────────────────────────────────────
async function loadBookings() {
  document.getElementById('bookingsContainer').innerHTML = '<div style="text-align:center;padding:40px;"><div class="loader-spin"></div></div>';
  try {
    const res = await fetch('/api/bookings/my', { credentials: 'include' });
    const bookings = await res.json();
    renderBookings(bookings);
  } catch { showToast('Failed to load bookings', 'error'); }
}

function renderBookings(bookings) {
  if (!bookings.length) {
    document.getElementById('bookingsContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎟️</div>
        <h3>No tickets yet</h3>
        <p>Browse movies and book your first ticket!</p>
        <button onclick="showPage('movies')" style="margin-top:16px; padding:10px 24px; background:linear-gradient(135deg,var(--gold),#b8862a); border:none; border-radius:8px; color:var(--dark); font-family:'DM Sans',sans-serif; font-weight:700; cursor:pointer;">Browse Movies →</button>
      </div>`;
    return;
  }

  document.getElementById('bookingsContainer').innerHTML = bookings.map(b => `
    <div class="booking-ticket">
      <div class="ticket-accent ${b.seat_level}"></div>
      <div class="ticket-body">
        <div class="ticket-header">
          <div class="ticket-movie">${b.title}</div>
          <span class="ticket-status ${b.status}">${b.status === 'confirmed' ? '✓ Confirmed' : '✗ Cancelled'}</span>
        </div>
        <div class="ticket-details">
          <div class="ticket-detail">
            <div class="ticket-detail-label">Level</div>
            <div class="ticket-detail-value"><span class="level-badge ${b.seat_level}">${b.seat_level.charAt(0).toUpperCase()+b.seat_level.slice(1)}</span></div>
          </div>
          <div class="ticket-detail">
            <div class="ticket-detail-label">Seat No.</div>
            <div class="ticket-detail-value" style="font-family:monospace; font-size:1rem;">${b.seat_number}</div>
          </div>
          <div class="ticket-detail">
            <div class="ticket-detail-label">Show Date</div>
            <div class="ticket-detail-value">${formatDate(b.show_date)}</div>
          </div>
          <div class="ticket-detail">
            <div class="ticket-detail-label">Amount</div>
            <div class="ticket-detail-value gold">₹${b.total_amount}</div>
          </div>
        </div>
        <div class="ticket-footer">
          <div>
            <div style="font-size:0.68rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;">Booking Ref</div>
            <div class="ticket-ref">${b.booking_reference}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:0.72rem; color:var(--text-dim); margin-bottom:6px;">${b.language} • ${b.genre}</div>
            ${b.status === 'confirmed' ? `<button class="btn-cancel-booking" onclick="cancelBooking(${b.id})">Cancel</button>` : '<span style="font-size:0.78rem; color:var(--text-dim);">Cannot rebook</span>'}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

async function cancelBooking(id) {
  if (!confirm('Cancel this booking?')) return;
  try {
    const res = await fetch(`/api/bookings/${id}/cancel`, { method: 'PATCH', credentials: 'include' });
    if (!res.ok) throw new Error();
    showToast('Booking cancelled', 'success');
    loadBookings();
    loadMovies();
  } catch { showToast('Failed to cancel', 'error'); }
}

// ─── UTILS ───────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

document.getElementById('seatModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
